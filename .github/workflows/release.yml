name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (e.g. 0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must be in X.Y.Z format"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;28.2.13676358"

      - name: Build slang static libraries
        run: make build ANDROID_NDK="$ANDROID_HOME/ndk/28.2.13676358"

      - name: Build AAR
        run: ./gradlew :kotlinslang:assembleRelease --no-daemon

      - name: Rename AAR
        run: |
          cp kotlinslang/build/outputs/aar/kotlinslang-release.aar \
             "kotlinslang-${{ inputs.version }}.aar"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            "kotlinslang-${{ inputs.version }}.aar"
